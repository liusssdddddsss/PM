#设置端口号
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
#连接数据库
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pm?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: emo1231
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        hbm2ddl.auto: update
        javax.persistence.validation.mode: none
        hibernate.foreign_key_checks: false
  mvc:
    encoding:
      charset: UTF-8
      force: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  web:
    resources:
      static-locations: classpath:/static/, file:${file.upload-dir}  # 关键：映射本地文件夹为静态资源

# 自定义上传目录（建议放在项目外，避免重新部署时丢失）
file:
  upload-dir: ./uploads/